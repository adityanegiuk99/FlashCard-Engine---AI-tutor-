services:
  - type: web
    name: flashcard-engine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.main:app
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-3.5-turbo
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:////var/data/app.db
    disk:
      name: flashcard-engine-data
      mountPath: /var/data
      sizeGB: 1
